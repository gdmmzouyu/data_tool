name: 打包Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'

      - name: 安装 MinGW 编译器 + UPX 压缩工具
        run: |
          choco install mingw -y
          choco install upx -y
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

      - name: 安装项目依赖与Nuitka
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka==2.4.8

      - name: 自动下载 DuckDB 扩展
        run: python download_ext.py

      - name: 打包前置校验
        run: |
          if (-not (Test-Path "master.key")) {
            Write-Host "找不到 master.key 密钥文件"
            exit 1
          }
          if (-not (Test-Path "extensions\excel.duckdb_extension")) {
            Write-Host "找不到 DuckDB 扩展文件"
            exit 1
          }
          Write-Host "所有资源文件校验通过"

      - name: Nuitka 打包生成EXE
        run: |
          nuitka --onefile `
            --mingw64 `
            --assume-yes-for-downloads `
            --nofollow-import-to=tkinter `
            --nofollow-import-to=unittest `
            --nofollow-import-to=distutils `
            --nofollow-import-to=test `
            --include-module=duckdb `
            --include-module=cryptography `
            --include-module=openpyxl `
            --include-module=pyarrow `
            --include-module=chardet `
            --include-module=psutil `
            --include-module=requests `
            --include-data-files=./master.key=master.key `
            --include-data-dir=./extensions=extensions `
            --output-dir=dist `
            --output-filename=DataTool.exe `
            main.py

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/DataTool.exe
          retention-days: 30
