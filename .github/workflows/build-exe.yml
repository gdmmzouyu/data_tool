name: 打包Windows EXE
on:
  push:
    branches: [ main ]    # 提交到main分支自动触发打包
  workflow_dispatch:      # 支持手动触发打包，调试必备

jobs:
  build:
    runs-on: windows-latest  # 微软官方Windows服务器构建
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置Python 3.14环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'      # 缓存依赖，第二次打包速度翻倍

      - name: 自动安装UPX压缩工具
        run: choco install upx -y

      - name: 安装项目依赖与Nuitka
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Nuitka 全参数优化打包
        run: |
          nuitka --onefile `
            --lto=yes `
            --mingw64 `
            --no-debug `
            --no-assertions `
            --nofollow-import-to=tkinter,unittest,distutils,test `
            --upx-bin=upx.exe `
            --upx-exclude=python314.dll `
            --output-dir=dist `
            main.py

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/
