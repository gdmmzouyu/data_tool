name: 打包Windows EXE
on:
  push:
    branches: [ main ]    # 提交到main分支自动触发打包
  workflow_dispatch:      # 支持手动触发打包，调试必备

jobs:
  build:
    runs-on: windows-latest  # 微软官方Windows服务器构建
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # 建议用3.12稳定版，3.14部分依赖兼容可能有问题
          architecture: 'x64'
          cache: 'pip'      # 缓存依赖，第二次打包速度翻倍

      - name: 安装 MinGW 编译器 + UPX 压缩工具
        run: |
          choco install mingw -y  # 原配置漏了！--mingw64 必须依赖MinGW
          choco install upx -y

      - name: 安装项目依赖与Nuitka
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka==2.4.8  # 固定版本避免Nuitka自身更新导致编译失败

      - name: Nuitka 全参数优化打包
        run: |
          nuitka --onefile `
            --lto=yes `
            --mingw64 `
            --no-debug `
            --no-assertions `
            --nofollow-import-to=tkinter,unittest,distutils,test `
            --include-module=duckdb,cryptography,openpyxl,pyarrow,chardet,psutil,requests `
            --include-data-files=./master.key=master.key `
            --include-data-dir=./extensions=extensions `
            --upx-bin=upx.exe `
            --upx-exclude=python312.dll `
            --output-dir=dist `
            --output-filename=DataTool.exe `
            main.py

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/DataTool.exe
          retention-days: 30
